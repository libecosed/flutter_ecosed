name: flutter_ecosed
description: "A relatively abstract Flutter Plugin."
version: 0.0.1
homepage: https://github.com/libecosed/flutter_ecosed
environment:
  sdk: '>=3.2.4 <4.0.0'
  flutter: '>=3.3.0'
dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_plugin_android_lifecycle: ^2.0.17
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: io.libecosed.flutter_ecosed
        pluginClass: FlutterEcosedPlugin