publish_to: 'none'
environment:
  sdk: '>=3.2.4 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_ecosed:
    path: ../
  cupertino_icons: ^1.0.2
  dynamic_color: ^1.6.9
dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true